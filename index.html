<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warkop Kang Arman</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#e2c9a9;
}

/* Navbar */
header{
    background:black;
    padding:20px 50px;
}

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
}

.logo{
    color:#d8c0a0;
    font-size:28px;
    font-weight:bold;
}

nav ul{
    display:flex;
    list-style:none;
    gap:25px;
    flex-wrap:wrap;
}

nav ul li a{
    color:white;
    text-decoration:none;
    font-size:18px;
    font-weight:bold;
    transition:0.3s;
}

nav ul li a:hover{
    color:#d8c0a0;
}

/* Hero Section */
.hero{
    position:relative;
    min-height:100vh;
    background: linear-gradient(
        rgba(0,0,0,0.4),
        rgba(0,0,0,0.4)
    ), url('KopiArman__.png');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    overflow:hidden;
    padding-bottom:100px;
}

/* Background text */
.bg-text{
    position:absolute;
    top:120px;
    left:50%;
    transform:translateX(-50%);
    font-size:130px;
    font-weight:bold;
    color:rgba(90, 60, 30, 0.08);
    z-index:1;
    white-space:nowrap;
}

/* Main Text */
.hero-content{
    position:relative;
    z-index:2;
    text-align:center;
    padding-top:80px;
}

.hero-content h1{
    font-size:75px;
    color:white;
    line-height:1;
}

.hero-content p{
    font-size:30px;
    color:#5a4033;
    margin-top:15px;
}

/* Produk */
.produk{
    position:absolute;
    top:58%;
    left:50%;
    transform:translate(-50%, -50%);
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:20px;
    z-index:3;
    flex-wrap:wrap;
}

.item{
    position:relative;
}

.item{
    position:relative;
    width:180px;
    transition:.3s;
}

.item:hover{
    transform:translateY(-10px);
}

.item img{
    width:100%;
    object-fit:contain;
}

/* Harga */
.price{
    position:absolute;
    top:10px;
    right:10px;
    background:#5d4037;
    color:white;
    width:70px;
    height:70px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:22px;
    font-weight:bold;
}

/* Meja bawah */
.table{
    position:absolute;
    bottom:0;
    width:100%;
    height:80px;
    background:#c9a987;
}

/* WhatsApp */
.wa{
    position:fixed;
    bottom:20px;
    right:20px;
    width:70px;
    height:70px;
    border-radius:50%;
    background:#25D366;
    color:white;
    text-decoration:none;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:35px;
    box-shadow:0 5px 15px rgba(0,0,0,.3);
}

/* Responsive */
@media(max-width:768px){
    .hero-content h1{
        font-size:50px;
    }

    .hero-content p{
        font-size:20px;
    }

    .bg-text{
        font-size:70px;
    }

    nav{
        flex-direction:column;
        gap:20px;
    }
}
</style>
</head>
<body>

<header>
    <nav>
        <div class="logo">Warkop Kang Arman</div>

        <ul>
            <li><a href="#">Beranda</a></li>
            <li><a href="#">Kopi</a></li>
            <li><a href="#">Seblak</a></li>
            <li><a href="#">Mie Ayam</a></li>
            <li><a href="#">Bakso</a></li>
            <li><a href="#">Gorengan</a></li>
            <li><a href="#">Testimoni</a></li>
            <li><a href="#">Kontak</a></li>
        </ul>
    </nav>
</header>

<section class="hero">

    <div class="bg-text">WARKOP KANG ARMAN</div>

    <div class="hero-content">
        <h1>Menu Favorit<br>Siap Santap</h1>
    </div>

<div class="produk">

    <div class="item">
        <img src="es kopi.png" alt="Kopi">
        <div class="price">10k</div>
    </div>

    <div class="item">
        <img src="seblak1.png" alt="Seblak">
        <div class="price">15k</div>
    </div>

    <div class="item">
        <img src="mieayam2.png" alt="Mie Ayam">
        <div class="price">12k</div>
    </div>

    <div class="item">
        <img src="bakso5.png" alt="Bakso">
        <div class="price">13k</div>
    </div>

    <div class="item">
        <img src="gorengan4.png" alt="Gorengan">
        <div class="price">2k</div>
    </div>

</div>

    <div class="table"></div>

</section>

<a href="https://wa.me/628xxxxxxxxxx" class="wa">☏</a>

</body>
</html>
