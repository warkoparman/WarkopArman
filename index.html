<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warkop Kang Arman</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#e2c9a9;
}

/* Navbar */
header{
    background:black;
    padding:20px 60px;
}

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    color:#d8c0a0;
    font-size:30px;
    font-weight:bold;
}

nav ul{
    display:flex;
    list-style:none;
    gap:40px;
}

nav ul li a{
    color:white;
    text-decoration:none;
    font-size:20px;
    font-weight:bold;
    transition:.3s;
}

nav ul li a:hover{
    color:#d8c0a0;
}

/* Hero Section */
.hero{
    position:relative;
    height:100vh;
    background:#d8c0a0;
    overflow:hidden;
}

/* Background Text */
.bg-text{
    position:absolute;
    top:120px;
    left:50%;
    transform:translateX(-50%);
    font-size:150px;
    font-weight:bold;
    color:rgba(100, 70, 40, 0.08);
    z-index:1;
    white-space:nowrap;
}

/* Main Text */
.hero-content{
    position:relative;
    z-index:2;
    text-align:center;
    margin-top:70px;
}

.hero-content h1{
    font-size:80px;
    color:white;
    line-height:1;
}

.hero-content p{
    font-size:55px;
    color:#5a4033;
    font-style:italic;
}

/* Produk */
.produk{
    position:relative;
    z-index:2;
    display:flex;
    justify-content:center;
    align-items:flex-end;
    margin-top:40px;
    gap:20px;
}

.item{
    position:relative;
}

.item img{
    width:300px;
}

.item:nth-child(2){
    transform:translateY(40px);
}

/* Badge Harga */
.price{
    position:absolute;
    top:20px;
    right:10px;
    background:#5d4037;
    color:white;
    width:85px;
    height:85px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:25px;
    font-weight:bold;
}

/* Table bawah */
.table{
    position:absolute;
    bottom:0;
    width:100%;
    height:80px;
    background:#c9a987;
}

/* Floating WA */
.wa{
    position:fixed;
    bottom:20px;
    right:20px;
    width:70px;
    height:70px;
    border-radius:50%;
    background:#25D366;
    color:white;
    text-decoration:none;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:35px;
    box-shadow:0 5px 15px rgba(0,0,0,.3);
}
</style>
</head>
<body>

<header>
    <nav>
        <div class="logo">Warkop Kang Arman</div>

        <ul>
            <li><a href="#">Halaman Utama</a></li>
            <li><a href="#">Menu</a></li>
            <li><a href="#">Berita</a></li>
            <li><a href="#">Testimoni</a></li>
        </ul>
    </nav>
</header>

<section class="hero">

    <div class="bg-text">WARKOP KANG ARMAN</div>

    <div class="hero-content">
        <h1>Menu Andalan<br>Terbaru</h1>
        <p>siap nemenin harimu ☕</p>
    </div>

    <div class="produk">
        <div class="item">
            <img src="kopi1.png" alt="Es Kopi">
            <div class="price">10k</div>
        </div>

        <div class="item">
            <img src="kopi2.png" alt="Es Teh">
            <div class="price">13k</div>
        </div>

        <div class="item">
            <img src="kopi3.png" alt="Kopi Susu">
            <div class="price">10k</div>
        </div>
    </div>

    <div class="table"></div>

</section>

<a href="https://wa.me/628xxxxxxxxxx" class="wa">☏</a>

</body>
</html>
